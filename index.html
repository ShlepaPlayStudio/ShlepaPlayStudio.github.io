<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Last Network</title>
    <style>
        /* Главные настройки сайта: черный фон и белый текст */
        body { 
            background: #000000; 
            color: #ffffff; 
            font-family: sans-serif; 
            text-align: center; 
            padding: 20px; 
        }
        
        /* Расположение блоков (картинок) на экране */
        .container { 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            margin-top: 50px; 
            flex-wrap: wrap; 
        }
        
        /* Левый блок с большой картинкой */
        .block-left { 
            width: 400px; 
            max-width: 90%; 
            background: #111; 
            padding: 10px; 
            border-radius: 8px; 
        }
        
        /* Правый блок с карточкой главы */
        .block-right { 
            width: 250px; 
            background: #111; 
            padding: 10px; 
            border-radius: 8px; 
            position: relative; 
        }
        
        img { 
            width: 100%; 
            border-radius: 4px; 
        }
        
        /* Главная большая кнопка DOWNLOAD, которая ведет на itch.io */
        .btn-main { 
            display: inline-block;
            background: red; 
            color: white; 
            text-decoration: none;
            padding: 15px 40px; 
            font-size: 24px; 
            font-weight: bold; 
            margin-top: 40px; 
            cursor: pointer; 
            border-radius: 4px;
        }
        .btn-main:hover {
            background: #cc0000;
        }
        
        /* Круглые стрелки переключения страниц */
        .arrow { 
            background: #fff; 
            color: #000; 
            border: none; 
            width: 40px; 
            height: 40px; 
            border-radius: 50%; 
            font-size: 20px; 
            cursor: pointer; 
            margin-top: 10px; 
        }
    </style>
</head>
<body>

    <!-- ЭКРАН 1: ГЛАВА 1 -->
    <div id="chapter1-screen">
        <div class="container">
            <!-- Левая большая картинка (вышка) -->
            <div class="block-left">
                <img src="25a51e1f-ea20-40c9-9c4f-70203507652e.png" alt="The Last Network">
                <h2 style="margin-top:10px;">The last network</h2>
            </div>
            <!-- Правая картинка (пень с цифрой 1) -->
            <div class="block-right">
                <img src="6f55f1cf-3f96-46ab-af65-0fbd9d2b145d.png" alt="Глава 1">
                <!-- Стрелка Вперед -->
                <button class="arrow" onclick="showComingSoon()">➔</button>
            </div>
        </div>
        <!-- Чистая и надежная ссылка на вашу страницу игры -->
        <a href="https://shlepaplaystudio.itch.io/the-last-network" target="_blank" class="btn-main">DOWNLOAD</a>
    </div>

    <!-- ЭКРАН 2: ЗАГЛУШКА (COMING SOON) -->
    <div id="coming-soon-screen" style="display: none; margin-top: 100px;">
        <h1 style="font-size: 60px; color: #444; letter-spacing: 2px;">COMING SOON</h1>
        <!-- Стрелка Назад -->
        <button class="arrow" onclick="showChapter1()">◀</button>
    </div>

    <script>
        function showComingSoon() {
            document.getElementById('chapter1-screen').style.display = 'none';
            document.getElementById('coming-soon-screen').style.display = 'block';
        }

        function showChapter1() {
            document.getElementById('coming-soon-screen').style.display = 'none';
            document.getElementById('chapter1-screen').style.display = 'block';
        }
    </script>

</body>
</html>
